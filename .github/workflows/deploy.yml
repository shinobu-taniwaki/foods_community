# ============================================================
# オンプレ デプロイ（雛形 / Phase 5 で完成）
# main への push 時に SSH 経由でオンプレサーバーへデプロイする。
#
# 必要な GitHub Secrets（設計書 §15.4）:
#   SSH_HOST / SSH_USER / SSH_KEY（deploy 専用ユーザーの秘密鍵）
# 注意: SUPABASE_SERVICE_ROLE_KEY は Secrets に置かず、
#       サーバー上の .env.production に直接配置する。
# ============================================================
name: Deploy (on-premise)

on:
  workflow_dispatch: # 当面は手動実行のみ。Phase 5 で push トリガーを有効化
  # push:
  #   branches: [main]

jobs:
  deploy:
    name: deploy to on-premise server
    runs-on: ubuntu-latest
    # Secrets 未設定の段階では実行をスキップ
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/mcc
            git pull --ff-only origin main
            # .env.production はサーバー上に常駐（Git 管理外）
            docker compose -f infra/app/docker-compose.yml --env-file .env.production up -d --build
            docker image prune -f
