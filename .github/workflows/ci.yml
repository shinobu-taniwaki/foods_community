name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: lint / typecheck / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm のバージョンは package.json の packageManager フィールドを単一ソースとする
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # NEXT_PUBLIC_* はビルド時に必要。CI ではダミー値で型/ビルドを通す。
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-ci
