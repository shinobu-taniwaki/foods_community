# ============================================================
# MCC Next.js アプリ（サーバー側・load 方式）
#
# 確定方針:
#   ローカル Mac で `docker build --platform linux/amd64` → `docker save`
#   → scp → サーバーで `docker load` → このファイルで起動。
#   サーバー上でビルドしない（メモリ OOM 回避）。
#
# 接続設計（単一 URL・host ネットワーク）:
#   MCC はブラウザから Supabase へ直接アクセスしない（client.ts 未使用）。
#   ただし画像の「署名付き URL」はサーバー側 Supabase URL のホストで生成されるため、
#   そのホストがブラウザからも到達できる必要がある。
#   → サーバーもブラウザも同じ `http://localhost:8100`（Kong）を使う。
#   → アプリを host ネットワークで起動し、コンテナの localhost = ホストの localhost に
#     することで、サーバー(コンテナ)も localhost:8100 で Kong に到達できる。
#   → HOSTNAME=127.0.0.1 で待受をループバックに限定（0.0.0.0 公開を防ぐ）。
#
# 前提:
#   - Supabase は別途起動済みで、Kong が `127.0.0.1:8100` に publish されている。
#   - リポジトリ直下相当の `.env.production`（chmod 600）を同ディレクトリに配置。
#
# 使い方（サーバー /home/hariki/mcc/ で）:
#   docker compose -f docker-compose.deploy.yml --env-file .env.production up -d
#
# ※ 本番（独自ドメイン）では NEXT_PUBLIC_SUPABASE_URL=https://api.marketing-camp.jp で
#   再ビルドし、SUPABASE_INTERNAL_URL も同 URL（nginx 経由）に合わせる。詳細は deploy-runbook.md。
# ============================================================
services:
  app:
    image: ${MCC_APP_IMAGE:-mcc-app:provisional}
    container_name: mcc-app
    restart: unless-stopped
    # 署名付き画像 URL をブラウザ到達可能にするため host ネットワークで起動。
    # （コンテナの localhost = ホストの localhost:8100 = Kong）
    network_mode: host
    environment:
      # Next standalone をループバックのみで待受（host ネットワークでの 0.0.0.0 公開を防ぐ）
      HOSTNAME: 127.0.0.1
      PORT: '3000'
      # サーバー(コンテナ)から Supabase への到達先。ブラウザの焼き込み URL と一致させる。
      SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-http://localhost:8100}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
