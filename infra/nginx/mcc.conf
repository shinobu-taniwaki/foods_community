# ============================================================
# Nginx リバースプロキシ設定（オンプレ・汎用テンプレート / 設計書 §15.1）
#
# ★ 実サーバー(27.133.240.132)向けの確定設定は同フォルダの
#   `marketing-camp.jp.conf`（証明書パス・ドメイン・Rocky8 仕様に対応済み）と
#   `ADMIN-HANDOFF.md`（管理者向け依頼書）を参照。本ファイルは雛形として残置。
#
# SSL 終端 → Next.js（127.0.0.1:3000）へプロキシ。
# Self-hosted Supabase の Kong を同一ドメインのサブドメインで公開する例も併記。
# 配置例: /etc/nginx/sites-available/mcc.conf → sites-enabled へシンボリックリンク
# 証明書は certbot（Let's Encrypt）で取得し、certbot renew を cron に登録する。
# ============================================================

# --- HTTP → HTTPS リダイレクト ---
server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # Let's Encrypt の更新チャレンジ用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- アプリ本体（Next.js） ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # セキュリティヘッダ
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;  # 画像アップロード用

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# --- Self-hosted Supabase（Kong API ゲートウェイ）---
# クライアント（ブラウザ）から NEXT_PUBLIC_SUPABASE_URL として到達できる必要がある。
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    client_max_body_size 50M;  # Storage アップロード用

    location / {
        # Self-hosted Supabase の Kong（デフォルト 8000）へ
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;          # Realtime WebSocket
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
