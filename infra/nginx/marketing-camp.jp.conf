# ============================================================
# MCC (marketing-camp.jp) Nginx リバースプロキシ設定【単一ドメイン版】
#
# このサーバー(27.133.240.132 / Rocky8)の運用に合わせた具体設定。
#   - 配置先は御社の vhost include 運用に合わせて（conf.d/ または conf.v/）。
#
# ★ SSL/証明書はサーバー側でご対応いただく前提です。
#   `ssl_certificate*` のパスは参考用プレースホルダ。御社の証明書設定に合わせて
#   記述・調整してください（本ファイルの本質は proxy_pass の振り分け部分です）。
#
# ★公開ドメインは marketing-camp.jp（+ www）の【1つだけ】。
#   Supabase(API/Kong) は 127.0.0.1:8100 で稼働しますが【外部公開しません】。
#   ブラウザからのアクセスはすべてアプリ(Next.js:3000)経由で完結します
#   （画像配信もアプリの /api/img/... 経由でサーバー内部から取得）。
#   → 必要な SSL 証明書は marketing-camp.jp(+www) の【1枚のみ】。api. サブドメインは不要です。
#
# ★安全性: 既存 k-bean 等の server ブロックには一切触れません（新規追加のみ）。
#   upstream は 127.0.0.1（ローカル）に閉じています。default_server は使いません。
#
# upstream:
#   - アプリ(Next.js): 127.0.0.1:3000   ← 唯一の公開入口
#   ※ Supabase API(Kong:8100) / Studio(8101) は公開しません（アプリ内部利用＋SSHトンネル管理）。
#
# Rocky8 標準 nginx(1.14)向けに `listen ... ssl http2` 形式を使用。
# ============================================================

# --- HTTP(80) → HTTPS リダイレクト（apex / www）---
server {
    listen 80;
    server_name marketing-camp.jp www.marketing-camp.jp;
    return 301 https://marketing-camp.jp$request_uri;
}

# --- www → apex 正規化 ---
server {
    listen 443 ssl http2;
    server_name www.marketing-camp.jp;

    ssl_certificate     /etc/nginx/ssl/marketing-camp.jp/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/marketing-camp.jp/privkey.pem;

    return 301 https://marketing-camp.jp$request_uri;
}

# --- アプリ本体（Next.js / 127.0.0.1:3000）= 唯一の公開入口 ---
server {
    listen 443 ssl http2;
    server_name marketing-camp.jp;

    ssl_certificate     /etc/nginx/ssl/marketing-camp.jp/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/marketing-camp.jp/privkey.pem;

    # セキュリティヘッダ
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;   # 画像アップロード（アプリ経由・圧縮後）用

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ※ api.marketing-camp.jp の server ブロックは【意図的に廃止】しました。
#   Supabase(Kong:8100) は外部公開せず、アプリ内部からのみ利用します。
#   そのため api. 用の DNS レコード・SSL 証明書は不要です。
