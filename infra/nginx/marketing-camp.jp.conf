# ============================================================
# MCC (marketing-camp.jp) Nginx リバースプロキシ設定
#
# このサーバー(27.133.240.132 / Rocky8)の運用に合わせた具体設定。
#   - 配置先は御社の vhost include 運用に合わせて（conf.d/ または conf.v/）。
#
# ★ SSL/証明書はサーバー側でご対応いただく前提です。
#   `ssl_certificate*` のパスは参考用プレースホルダ。御社の証明書設定に合わせて
#   記述・調整してください（本ファイルの本質は proxy_pass の振り分け部分です）。
#
# ★安全性: 既存 k-bean 等の server ブロックには一切触れません（新規追加のみ）。
#   upstream はすべて 127.0.0.1（ローカル）に閉じています。default_server は使いません。
#
# upstream:
#   - アプリ(Next.js)   : 127.0.0.1:3000
#   - Supabase API(Kong): 127.0.0.1:8100
#   ※ Studio(127.0.0.1:8101) は公開しません（SSH トンネル＋Basic 認証で管理）。
#
# Rocky8 標準 nginx(1.14)向けに `listen ... ssl http2` 形式を使用。
# ============================================================

# --- HTTP(80) → HTTPS リダイレクト（apex / www / api）---
server {
    listen 80;
    server_name marketing-camp.jp www.marketing-camp.jp api.marketing-camp.jp;
    return 301 https://$host$request_uri;
}

# --- www → apex 正規化 ---
server {
    listen 443 ssl http2;
    server_name www.marketing-camp.jp;

    ssl_certificate     /etc/nginx/ssl/marketing-camp.jp/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/marketing-camp.jp/privkey.pem;

    return 301 https://marketing-camp.jp$request_uri;
}

# --- アプリ本体（Next.js / 127.0.0.1:3000）---
server {
    listen 443 ssl http2;
    server_name marketing-camp.jp;

    ssl_certificate     /etc/nginx/ssl/marketing-camp.jp/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/marketing-camp.jp/privkey.pem;

    # セキュリティヘッダ
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;   # 画像アップロード用

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# --- Supabase API（Kong / 127.0.0.1:8100）---
# ブラウザの NEXT_PUBLIC_SUPABASE_URL = https://api.marketing-camp.jp として到達する。
server {
    listen 443 ssl http2;
    server_name api.marketing-camp.jp;

    # SAN 証明書（apex/www/api を1枚に含める）なら同一ファイルでOK。
    # api 専用証明書を使う場合はそのパスに差し替え。
    ssl_certificate     /etc/nginx/ssl/marketing-camp.jp/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/marketing-camp.jp/privkey.pem;

    client_max_body_size 50M;   # Storage アップロード用

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;   # Realtime WebSocket
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 3600s;                           # Realtime 長時間接続
    }
}
